# Make the USB sound card (card __CARD__) the default ALSA device for both
# capture and playback. The `plug` layer auto-converts sample rate / format /
# channels, so apps that open 16 kHz mono int16 (like assistant.py) work even
# on cheap CM108 cards that only do 48 kHz stereo.
#
# This is a TEMPLATE: setup.sh substitutes __CARD__ for the detected USB card
# index and writes the result to /etc/asound.conf. Safe to edit the card
# number by hand if auto-detection picked the wrong one (check `arecord -l`).
# Marker line below lets setup.sh recognise files it wrote (idempotency).
# managed-by: telephone-setup.sh

pcm.usb {
    type hw
    card __CARD__
}

pcm.!default {
    type asym
    playback.pcm {
        type plug
        slave.pcm "usb"
    }
    capture.pcm {
        type plug
        slave.pcm "usb"
    }
}

ctl.!default {
    type hw
    card __CARD__
}
