<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="605" viewBox="0 0 1060 605" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-audio" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#1565c0"/></marker>
    <marker id="arr-pwr"   markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#e08a00"/></marker>
    <marker id="arr-gpio"  markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#c2185b"/></marker>
    <marker id="arr-data"  markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#333"/></marker>
    <marker id="arr-net"   markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#2e7d32"/></marker>
  </defs>

  <style>
    .box   { fill:#ffffff; stroke:#333; stroke-width:2; }
    .pi    { fill:#fde8ef; stroke:#c2185b; stroke-width:2; }
    .audio { fill:#e8f1fd; stroke:#1565c0; stroke-width:2; }
    .power { fill:#fff4e0; stroke:#e08a00; stroke-width:2; }
    .cloud { fill:#eafbe8; stroke:#2e7d32; stroke-width:2; }
    .title { font-size:20px; font-weight:bold; fill:#222; }
    .lbl   { font-size:14px; font-weight:bold; fill:#222; }
    .sub   { font-size:11px; fill:#555; }
    .pin   { font-size:11.5px; fill:#222; font-weight:bold; }
    .waudio{ stroke:#1565c0; stroke-width:2.5; fill:none; }
    .wpwr  { stroke:#e08a00; stroke-width:2.5; fill:none; }
    .wgpio { stroke:#c2185b; stroke-width:2.5; fill:none; }
    .wdata { stroke:#333;    stroke-width:2.5; fill:none; }
    .wnet  { stroke:#2e7d32; stroke-width:2.5; fill:none; stroke-dasharray:7 5; }
    .note  { font-size:11px; fill:#666; }
    .warn  { font-size:11px; fill:#b00020; font-weight:bold; }
    .da    { fill:#1565c0; } .dp { fill:#e08a00; } .dg { fill:#c2185b; } .dd { fill:#333; } .dn { fill:#2e7d32; }
  </style>

  <text x="30" y="32" class="title">Rotary Pay Phone -&gt; LLM Voice Assistant -- Wiring Diagram</text>
  <text x="30" y="52" class="sub">All connections are low-voltage 5 V DC. Pin numbers = Raspberry Pi physical header (pinout.xyz). Leave the old telephone line / bell disconnected.</text>

  <!-- =============== WIRES (drawn first, so boxes sit on top) =============== -->
  <!-- 1: handset mic -> USB card MIC IN -->
  <path class="waudio" d="M222 184 H300" marker-end="url(#arr-audio)"/>
  <text x="240" y="178" class="note">mic in</text>

  <!-- 2: USB card HEADPHONE OUT -> amp A+/A- -->
  <path class="waudio" d="M405 250 V300" marker-end="url(#arr-audio)"/>
  <text x="410" y="278" class="note">audio</text>

  <!-- 3: amp OUT+/OUT- -> handset speaker -->
  <path class="waudio" d="M300 402 H262 V315 H222" marker-end="url(#arr-audio)"/>
  <text x="232" y="332" class="note">spkr</text>

  <!-- 4: USB card USB-A <-> Pi USB (data, bidirectional) -->
  <path class="wdata" d="M510 212 H555 V184 H580" marker-start="url(#arr-data)" marker-end="url(#arr-data)"/>
  <text x="520" y="206" class="note">USB</text>

  <!-- 5: Pi 5V + GND -> amp VIN/GND -->
  <path class="wpwr" d="M580 227 H540 V430 H510" marker-end="url(#arr-pwr)"/>
  <text x="516" y="424" class="note">5 V + GND</text>

  <!-- 6: power supply -> Pi USB-C -->
  <path class="wpwr" d="M685 480 V440" marker-end="url(#arr-pwr)"/>
  <text x="690" y="466" class="note">5 V</text>

  <!-- 7: hook switch -> Pi GPIO17 / GND -->
  <path class="wgpio" d="M880 175 H855 V294 H830" marker-end="url(#arr-gpio)"/>
  <text x="836" y="288" class="note">hook</text>

  <!-- 8: rotary dial -> Pi GPIO27 / GND -->
  <path class="wgpio" d="M880 320 H858 V362 H830" marker-end="url(#arr-gpio)"/>
  <text x="836" y="356" class="note">dial</text>

  <!-- 9: Pi <-> cloud API (Wi-Fi, bidirectional) -->
  <path class="wnet" d="M830 418 H852 V490 H880" marker-start="url(#arr-net)" marker-end="url(#arr-net)"/>
  <text x="856" y="484" class="note">Wi-Fi</text>

  <!-- connection dots -->
  <circle cx="222" cy="184" r="3.5" class="da"/><circle cx="300" cy="184" r="3.5" class="da"/>
  <circle cx="405" cy="250" r="3.5" class="da"/><circle cx="405" cy="300" r="3.5" class="da"/>
  <circle cx="300" cy="402" r="3.5" class="da"/><circle cx="222" cy="315" r="3.5" class="da"/>
  <circle cx="510" cy="212" r="3.5" class="dd"/><circle cx="580" cy="184" r="3.5" class="dd"/>
  <circle cx="580" cy="227" r="3.5" class="dp"/><circle cx="510" cy="430" r="3.5" class="dp"/>
  <circle cx="685" cy="480" r="3.5" class="dp"/><circle cx="685" cy="440" r="3.5" class="dp"/>
  <circle cx="880" cy="175" r="3.5" class="dg"/><circle cx="830" cy="294" r="3.5" class="dg"/>
  <circle cx="880" cy="320" r="3.5" class="dg"/><circle cx="830" cy="362" r="3.5" class="dg"/>
  <circle cx="830" cy="418" r="3.5" class="dn"/><circle cx="880" cy="490" r="3.5" class="dn"/>

  <!-- ===================== HANDSET ===================== -->
  <rect x="40" y="95" width="200" height="290" rx="10" class="box"/>
  <text x="55" y="118" class="lbl">HANDSET</text>
  <text x="55" y="134" class="sub">(reuse shell + cord)</text>
  <rect x="58" y="150" width="164" height="70" rx="6" class="audio"/>
  <text x="70" y="178" class="lbl">Electret Mic</text>
  <text x="70" y="196" class="sub">mouthpiece - (+)/(-)</text>
  <rect x="58" y="280" width="164" height="70" rx="6" class="audio"/>
  <text x="70" y="308" class="lbl">Speaker 8 ohm</text>
  <text x="70" y="326" class="sub">earpiece - OUT+/OUT-</text>

  <!-- ===================== USB SOUND CARD ===================== -->
  <rect x="300" y="110" width="210" height="140" rx="10" class="audio"/>
  <text x="312" y="134" class="lbl">USB Sound Card</text>
  <text x="312" y="150" class="sub">CM108-class, plug-and-play</text>
  <text x="312" y="188" class="pin">MIC IN  (from mic, 3.5 mm)</text>
  <text x="312" y="216" class="pin">USB-A  (to Pi)</text>
  <text x="312" y="244" class="pin">HEADPHONE OUT  (to amp)</text>

  <!-- ===================== PAM8302 AMP ===================== -->
  <rect x="300" y="300" width="210" height="150" rx="10" class="audio"/>
  <text x="312" y="324" class="lbl">PAM8302A Amp</text>
  <text x="312" y="340" class="sub">2.5 W mono (BTL)</text>
  <text x="312" y="376" class="pin">A+ / A-  (audio in)</text>
  <text x="312" y="406" class="pin">OUT+ / OUT-  (to speaker)</text>
  <text x="312" y="434" class="pin">VIN / GND  (5 V from Pi)</text>

  <!-- ===================== RASPBERRY PI ===================== -->
  <rect x="580" y="110" width="250" height="330" rx="10" class="pi"/>
  <text x="595" y="134" class="lbl">Raspberry Pi 4</text>
  <text x="595" y="150" class="sub">Wi-Fi / Python / GPIO</text>
  <text x="595" y="188" class="pin">USB  (sound card)</text>
  <text x="595" y="218" class="pin">5V   (pin 2 / 4)</text>
  <text x="595" y="240" class="pin">GND  (pin 6)</text>
  <text x="595" y="298" class="pin">GPIO17 (pin 11)</text>
  <text x="595" y="320" class="pin">GND    (pin 9)</text>
  <text x="595" y="366" class="pin">GPIO27 (pin 13)</text>
  <text x="595" y="388" class="pin">GND    (pin 14)</text>
  <text x="595" y="424" class="sub">USB-C power (bottom)   |   Wi-Fi (side)</text>

  <!-- ===================== HOOK SWITCH ===================== -->
  <rect x="880" y="120" width="160" height="110" rx="10" class="box"/>
  <text x="895" y="146" class="lbl">Hook Switch</text>
  <text x="895" y="163" class="sub">(original switchhook)</text>
  <text x="895" y="186" class="sub">leg A -> GPIO17</text>
  <text x="895" y="203" class="sub">leg B -> GND</text>
  <text x="895" y="220" class="sub">(pull-up in software)</text>

  <!-- ===================== ROTARY DIAL ===================== -->
  <rect x="880" y="265" width="160" height="110" rx="10" class="box"/>
  <text x="895" y="291" class="lbl">Rotary Dial</text>
  <text x="895" y="308" class="sub">(optional) pulse contacts</text>
  <text x="895" y="331" class="sub">A -> GPIO27</text>
  <text x="895" y="348" class="sub">B -> GND</text>

  <!-- ===================== POWER SUPPLY ===================== -->
  <rect x="580" y="480" width="250" height="80" rx="10" class="power"/>
  <text x="595" y="506" class="lbl">5 V / 3 A USB-C Supply</text>
  <text x="595" y="524" class="sub">to Pi USB-C power input</text>
  <text x="595" y="542" class="sub">Pi 5 V rail also feeds the amp</text>

  <!-- ===================== CLOUD API ===================== -->
  <rect x="880" y="440" width="170" height="120" rx="10" class="cloud"/>
  <text x="895" y="466" class="lbl">Hosted API</text>
  <text x="895" y="484" class="sub">(OpenAI etc.)</text>
  <text x="895" y="508" class="sub">STT -> LLM -> TTS</text>
  <text x="895" y="530" class="sub">over Wi-Fi (HTTPS)</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="40" y="462" width="320" height="100" rx="8" fill="#fafafa" stroke="#ccc"/>
  <text x="52" y="485" class="lbl">Legend</text>
  <line x1="54" y1="505" x2="86" y2="505" class="waudio"/><text x="94" y="509" class="sub">audio signal</text>
  <line x1="54" y1="529" x2="86" y2="529" class="wpwr"/><text x="94" y="533" class="sub">5 V power</text>
  <line x1="54" y1="553" x2="86" y2="553" class="wgpio"/><text x="94" y="557" class="sub">GPIO (switch / dial)</text>
  <line x1="210" y1="505" x2="242" y2="505" class="wdata"/><text x="250" y="509" class="sub">USB / data</text>
  <line x1="210" y1="529" x2="242" y2="529" class="wnet"/><text x="250" y="533" class="sub">Wi-Fi / HTTPS</text>

  <!-- footnote -->
  <text x="40" y="588" class="warn">! Speaker connects only across the amp's OUT+ / OUT- -- never tie either speaker wire to ground (PAM8302 is a bridge-tied / BTL output).</text>
</svg>
