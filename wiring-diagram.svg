<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760" font-family="Helvetica, Arial, sans-serif">
  <style>
    .box   { fill:#ffffff; stroke:#333; stroke-width:2; rx:8; }
    .pi    { fill:#fde8ef; stroke:#c2185b; stroke-width:2; }
    .audio { fill:#e8f1fd; stroke:#1565c0; stroke-width:2; }
    .power { fill:#fff4e0; stroke:#e08a00; stroke-width:2; }
    .cloud { fill:#eafbe8; stroke:#2e7d32; stroke-width:2; }
    .title { font-size:20px; font-weight:bold; fill:#222; }
    .lbl   { font-size:14px; font-weight:bold; fill:#222; }
    .sub   { font-size:11px; fill:#555; }
    .pin   { font-size:11px; fill:#333; font-weight:bold; }
    .wire  { stroke:#333; stroke-width:2.5; fill:none; }
    .waudio{ stroke:#1565c0; stroke-width:2.5; fill:none; }
    .wpwr  { stroke:#e08a00; stroke-width:2.5; fill:none; }
    .wgpio { stroke:#c2185b; stroke-width:2.5; fill:none; }
    .wnet  { stroke:#2e7d32; stroke-width:2.5; fill:none; stroke-dasharray:7 5; }
    .note  { font-size:11px; fill:#777; }
  </style>

  <text x="30" y="34" class="title">Rotary Pay Phone → LLM Voice Assistant — Wiring Diagram</text>
  <text x="30" y="54" class="sub">All connections are low-voltage (5 V DC). Pin numbers = Raspberry Pi physical header (pinout.xyz). Leave the old telephone line / bell disconnected.</text>

  <!-- ===================== HANDSET ===================== -->
  <rect x="30" y="90" width="230" height="250" rx="10" class="box"/>
  <text x="45" y="115" class="lbl">HANDSET</text>
  <text x="45" y="132" class="sub">(reuse original shell + cord)</text>

  <rect x="55" y="150" width="180" height="60" rx="6" class="audio"/>
  <text x="70" y="175" class="lbl">Electret Mic</text>
  <text x="70" y="194" class="sub">in mouthpiece — (+) / (–)</text>

  <rect x="55" y="255" width="180" height="60" rx="6" class="audio"/>
  <text x="70" y="280" class="lbl">Speaker 8 Ω</text>
  <text x="70" y="299" class="sub">in earpiece — OUT+ / OUT–</text>

  <!-- ===================== USB SOUND CARD ===================== -->
  <rect x="340" y="120" width="210" height="150" rx="10" class="audio"/>
  <text x="355" y="145" class="lbl">USB Sound Card</text>
  <text x="355" y="162" class="sub">CM108-class, plug-and-play</text>
  <text x="355" y="200" class="pin">MIC IN  ◄── (3.5 mm)</text>
  <text x="355" y="224" class="pin">HEADPHONE OUT ──►</text>
  <text x="355" y="252" class="sub">USB-A ──► Pi (direct)</text>

  <!-- ===================== PAM8302 AMP ===================== -->
  <rect x="340" y="320" width="210" height="150" rx="10" class="audio"/>
  <text x="355" y="345" class="lbl">PAM8302A Amp</text>
  <text x="355" y="362" class="sub">2.5 W mono (BTL)</text>
  <text x="355" y="392" class="pin">A+  ◄── audio</text>
  <text x="355" y="412" class="pin">A–  ◄── signal gnd</text>
  <text x="355" y="436" class="pin">VIN / GND ◄── 5 V</text>
  <text x="355" y="458" class="pin">OUT+ / OUT– ──► speaker</text>

  <!-- ===================== RASPBERRY PI ===================== -->
  <rect x="630" y="120" width="280" height="300" rx="10" class="pi"/>
  <text x="650" y="145" class="lbl">Raspberry Pi 4</text>
  <text x="650" y="162" class="sub">Wi-Fi · Python · GPIO</text>

  <text x="650" y="195" class="pin">USB ◄──► USB sound card</text>
  <text x="650" y="225" class="pin">5V  (pin 2/4) ──► amp VIN</text>
  <text x="650" y="251" class="pin">GND (pin 6)   ──► amp GND</text>
  <text x="650" y="285" class="pin">GPIO17 (pin 11) ◄── hook switch</text>
  <text x="650" y="311" class="pin">GND   (pin 9)   ◄── hook switch</text>
  <text x="650" y="345" class="pin">GPIO27 (pin 13) ◄── dial (opt.)</text>
  <text x="650" y="371" class="pin">GND   (pin 14)  ◄── dial (opt.)</text>
  <text x="650" y="402" class="sub">USB-C ◄── 5 V power supply</text>

  <!-- ===================== HOOK SWITCH ===================== -->
  <rect x="630" y="470" width="200" height="90" rx="10" class="box"/>
  <text x="645" y="495" class="lbl">Hook Switch</text>
  <text x="645" y="513" class="sub">(original switchhook)</text>
  <text x="645" y="534" class="sub">leg A → GPIO17</text>
  <text x="645" y="550" class="sub">leg B → GND  (pull-up in SW)</text>

  <!-- ===================== ROTARY DIAL (optional) ===================== -->
  <rect x="630" y="585" width="200" height="90" rx="10" class="box"/>
  <text x="645" y="610" class="lbl">Rotary Dial (optional)</text>
  <text x="645" y="628" class="sub">pulse contacts</text>
  <text x="645" y="649" class="sub">A → GPIO27</text>
  <text x="645" y="665" class="sub">B → GND</text>

  <!-- ===================== POWER ===================== -->
  <rect x="340" y="520" width="210" height="80" rx="10" class="power"/>
  <text x="355" y="545" class="lbl">5 V / 3 A USB-C Supply</text>
  <text x="355" y="565" class="sub">USB → Pi power input</text>
  <text x="355" y="585" class="sub">Pi 5 V rail also feeds amp</text>

  <!-- ===================== CLOUD ===================== -->
  <rect x="340" y="640" width="270" height="90" rx="10" class="cloud"/>
  <text x="355" y="665" class="lbl">Hosted API (OpenAI etc.)</text>
  <text x="355" y="685" class="sub">Speech-to-Text → LLM → Text-to-Speech</text>
  <text x="355" y="705" class="sub">reached over Wi-Fi (HTTPS)</text>

  <!-- ===================== WIRES ===================== -->
  <!-- Mic -> USB card MIC IN -->
  <path class="waudio" d="M235 180 H300 V198 H335"/>
  <text x="245" y="172" class="note">mic</text>

  <!-- USB card HEADPHONE OUT -> amp A+/A- -->
  <path class="waudio" d="M510 222 H575 V388 H540"/>
  <text x="555" y="305" class="note">audio out</text>

  <!-- amp OUT -> speaker -->
  <path class="waudio" d="M440 470 V490 H280 V300 H235"/>
  <text x="290" y="486" class="note">spkr OUT+/OUT–</text>

  <!-- USB card USB -> Pi USB -->
  <path class="wire" d="M510 250 H600 V193 H645"/>

  <!-- Pi 5V/GND -> amp VIN/GND -->
  <path class="wpwr" d="M790 230 H930 V490 H540 V430"/>
  <text x="800" y="222" class="note">5 V + GND → amp</text>

  <!-- Hook switch -> Pi GPIO17 / GND -->
  <path class="wgpio" d="M730 470 V445 Q730 430 718 430 H760"/>
  <text x="735" y="462" class="note">hook</text>

  <!-- Rotary dial -> Pi GPIO27 -->
  <path class="wgpio" d="M830 615 H880 V360 H905"/>

  <!-- Power supply -> Pi -->
  <path class="wpwr" d="M510 545 H600 V405 H645"/>

  <!-- Pi -> Cloud (wifi) -->
  <path class="wnet" d="M770 420 V610 H615 V685"/>
  <text x="780" y="560" class="note">Wi-Fi</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="640" width="290" height="100" rx="8" fill="#fafafa" stroke="#ccc"/>
  <text x="42" y="662" class="lbl">Legend</text>
  <line x1="48" y1="680" x2="78" y2="680" class="waudio"/><text x="86" y="684" class="sub">audio signal</text>
  <line x1="48" y1="700" x2="78" y2="700" class="wpwr"/><text x="86" y="704" class="sub">5 V power</text>
  <line x1="48" y1="720" x2="78" y2="720" class="wgpio"/><text x="86" y="724" class="sub">GPIO (switch / dial)</text>
  <line x1="180" y1="680" x2="210" y2="680" class="wire"/><text x="218" y="684" class="sub">USB / data</text>
  <line x1="180" y1="700" x2="210" y2="700" class="wnet"/><text x="218" y="704" class="sub">Wi-Fi / HTTPS</text>
</svg>
